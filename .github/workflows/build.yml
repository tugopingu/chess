name: Build All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Linux ----------
      - name: Install SFML (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt install -y libsfml-dev

      - name: Configure (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake --build build

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chess-linux
          path: build/chess

      # ---------- Windows ----------
      - name: Download SFML (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          curl.exe -L -o sfml.zip https://github.com/SFML/SFML/releases/download/2.6.2/SFML-2.6.2-windows-gcc-13.1.0-mingw-64-bit.zip
          7z x sfml.zip
          Rename-Item -Path "SFML-2.6.2-windows-gcc-13.1.0-mingw-64-bit" -NewName "SFML-2.6.2"
      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release `
            -DSFML_DIR="$PWD/SFML-2.6.2/lib/cmake/SFML"

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake --build build --config Release

      - name: Copy DLLs (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir chess-windows
          cp build/chess.exe chess-windows/
          cp SFML-2.6.2/bin/*.dll chess-windows/

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chess-windows
          path: chess-windows/
      # ---------- macOS ----------
      - name: Install SFML (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install sfml

      - name: Configure (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake --build build

      - name: Bundle dylibs (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir chess-bundle
          cp build/chess chess-bundle/
          cp /opt/homebrew/lib/libsfml-*.dylib chess-bundle/ 2>/dev/null || \
          cp /usr/local/lib/libsfml-*.dylib chess-bundle/
          install_name_tool -add_rpath @executable_path chess-bundle/chess

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chess-macos
          path: chess-bundle/
